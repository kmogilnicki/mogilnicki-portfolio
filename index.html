<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krzysztof Mogilnicki</title>
    <meta name="description" content="Krzysztof Mogilnicki - CRM Manager, Customer Services Expert & AI Enthusiast">
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 600px;
            animation: fadeIn 1s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff 0%, #a8c0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .tagline {
            font-size: clamp(1rem, 2.5vw, 1.25rem);
            color: #a8c0ff;
            margin-bottom: 3rem;
            font-weight: 300;
            letter-spacing: 0.5px;
        }
        .badges {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 3rem;
        }
        .badge {
            padding: 0.5rem 1.25rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(168, 192, 255, 0.3);
            border-radius: 25px;
            font-size: 0.875rem;
            color: #e0e7ff;
            backdrop-filter: blur(10px);
        }
        .message {
            font-size: 1rem;
            color: #c0c7d4;
            margin-bottom: 3rem;
            line-height: 1.6;
        }
        .contact {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }
        .contact a {
            color: #ffffff;
            text-decoration: none;
            font-size: 1rem;
            padding: 0.75rem 1.5rem;
            border: 1px solid rgba(168, 192, 255, 0.4);
            border-radius: 8px;
            transition: all 0.3s ease;
            min-width: 280px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .contact a:hover {
            background: rgba(168, 192, 255, 0.15);
            border-color: #a8c0ff;
            transform: translateY(-2px);
        }
        .footer {
            margin-top: 4rem;
            font-size: 0.75rem;
            color: #6b7280;
        }
        .pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Krzysztof Mogilnicki</h1>
        <p class="tagline">AI in business • Agile Project Mngt • CRM • Customer Services</p>
        
        <div class="badges">
            <span class="badge">AI First &amp; Automation</span>
            <span class="badge">Agile PM</span>
            <span class="badge">BPM &amp; CRM</span>
            <span class="badge">Data Analytics</span>
        </div>
        
        <p class="message">
            <span class="pulse"></span>
            Portfolio coming soon. Stay tuned.
        </p>
        
        <div class="contact">
            <a href="mailto:krzysztof@mogilnicki.ai">
                ✉️ krzysztof@mogilnicki.ai
            </a>
        </div>
        
        <div class="footer">
            © 2026 Krzysztof Mogilnicki
        </div>
    </div>
</body>
</html>
